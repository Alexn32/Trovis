name: trovis
version: "0.1.0"
description: Connect Hermes Agent to Trovis for monitoring and management
author: Trovis
requires_env:
  - name: TROVIS_API_KEY
    prompt: "Your Trovis API key (from the Trovis dashboard)"
    help: "Sign up at your Trovis instance to get an API key"
    required_for: "telemetry export"
  - name: TROVIS_ENDPOINT
    prompt: "Your Trovis OTLP endpoint"
    help: "Defaults to the Trovis cloud. Override for self-hosted backends."
    required_for: "telemetry export"
    optional: true
  - name: TROVIS_AGENT_NAME
    prompt: "Name to display in the Trovis dashboard"
    help: "Defaults to 'hermes-agent'."
    required_for: "service.name attribute"
    optional: true
  - name: TROVIS_CAPTURE_OUTPUTS
    prompt: "Capture message + tool result content? (true/false)"
    help: "Off by default. Set to 'true' to include text payloads in spans."
    required_for: "content capture"
    optional: true
