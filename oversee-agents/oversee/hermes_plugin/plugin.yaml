name: oversee
version: "0.1.0"
description: Connect Hermes Agent to Oversee for monitoring and management
author: Oversee
requires_env:
  - name: OVERSEE_API_KEY
    prompt: "Your Oversee API key (from the Oversee dashboard)"
    help: "Sign up at your Oversee instance to get an API key"
    required_for: "telemetry export"
  - name: OVERSEE_ENDPOINT
    prompt: "Your Oversee OTLP endpoint"
    help: "Defaults to the Oversee cloud. Override for self-hosted backends."
    required_for: "telemetry export"
    optional: true
  - name: OVERSEE_AGENT_NAME
    prompt: "Name to display in the Oversee dashboard"
    help: "Defaults to 'hermes-agent'."
    required_for: "service.name attribute"
    optional: true
  - name: OVERSEE_CAPTURE_OUTPUTS
    prompt: "Capture message + tool result content? (true/false)"
    help: "Off by default. Set to 'true' to include text payloads in spans."
    required_for: "content capture"
    optional: true
